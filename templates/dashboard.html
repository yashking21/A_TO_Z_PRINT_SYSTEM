<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f7fb;
margin:0;
padding:40px;
}

h1{
color:#1565C0;
text-align:center;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
max-width:700px;
margin:auto;
}

.stock-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
margin:10px 0;
background:#f8f8f8;
border-radius:10px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#1565C0;
color:white;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

</style>

</head>

<body>

<h1>🛠️ A TO Z STATIONERY</h1>

<div class="card">

<h2>📦 Stock Manager</h2>

<div class="stock-item">
<span>A4 Paper</span>
<button>Edit</button>
</div>

<div class="stock-item">
<span>A3 Paper</span>
<button>Edit</button>
</div>

<div class="stock-item">
<span>PVC ID Cards</span>
<button>Edit</button>
</div>

<div class="stock-item">
<span>Lamination Sheets</span>
<button>Edit</button>
</div>

<div class="stock-item">
<span>Photo Paper</span>
<button>Edit</button>
</div>

<br>

<button>➕ Add New Item</button>

</div>

</body>
</html>
