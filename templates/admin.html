<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#1565C0,#42A5F5);
}

.login-box{
background:white;
padding:40px;
border-radius:20px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
text-align:center;
}

h1{
margin-bottom:25px;
color:#1565C0;
}

input{
width:100%;
padding:15px;
margin-bottom:20px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#ff9800;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#f57c00;
}

</style>

</head>

<body>

<div class="login-box">

<h1>🔒 Admin Login</h1>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

</div>

</body>

</html>
