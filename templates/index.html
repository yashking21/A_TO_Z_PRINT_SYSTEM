<!DOCTYPE html>
<html>

<head>

<title>A TO Z STATIONERY</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f2f6ff;
margin:0;
padding:0;
}

.container{
max-width:500px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.15);
text-align:center;
}

h1{
color:#1565C0;
margin-bottom:5px;
}

p{
color:#666;
}

input,select,textarea{

width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;

border-radius:8px;
border:1px solid #ccc;

box-sizing:border-box;

}

button{

width:100%;

padding:15px;

background:#ff9800;

color:white;

font-size:18px;

border:none;

border-radius:10px;

cursor:pointer;

margin-top:10px;

}

button:hover{

background:#f57c00;

}

.drive-button{

display:block;

width:100%;

padding:15px;

background:#1565C0;

color:white;

font-size:18px;

border-radius:10px;

text-decoration:none;

margin-bottom:20px;

box-sizing:border-box;

}

.drive-button:hover{

background:#0d47a1;

}

hr{

margin:25px 0;

border:0;

border-top:1px solid #ddd;

}

</style>

</head>


<body>

<div class="container">


<h1>🖨️ A TO Z STATIONERY</h1>

<p>Professional Printing & Document Services</p>


<!-- GOOGLE FORM UPLOAD BUTTON -->

<a class="drive-button" 
href="https://forms.gle/ukAjVgJc65WEA1ME9" 
target="_blank">

📄 Upload Print Files

</a>


<p>
Upload your files using the button above.
</p>


<hr>


<!-- OLD DIRECT UPLOAD FORM -->

<form action="/upload" method="POST" enctype="multipart/form-data">


<input type="text" placeholder="Customer Name">


<input type="text" placeholder="WhatsApp Number">


<input type="file" name="file">


<select>

<option>A4 Paper</option>

<option>A3 Paper</option>

</select>


<select>

<option>Black & White</option>

<option>Color Printing</option>

</select>


<input type="number" value="1">


<textarea placeholder="Special Instructions"></textarea>


<button type="submit">

🚀 Upload Files

</button>


</form>


</div>


</body>

</html>
